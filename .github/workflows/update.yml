name: Update grants data

on:
  schedule:
    - cron: '0 11 * * *'      # daily at 11:00 UTC (~07:00 US Eastern)
  workflow_dispatch: {}        # allow manual "Run workflow" button

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch latest grants
        run: python scripts/fetch_grants.py
      - name: Rebuild calendar feed (.ics)
        run: python scripts/build_ics.py
      - name: Commit if changed
        run: |
          git config user.name  "grants-bot"
          git config user.email "grants-bot@users.noreply.github.com"
          git add data/grants.json data/grant_deadlines.ics
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Auto-update grants data ($(date -u +%Y-%m-%d))"
            git push
          fi
